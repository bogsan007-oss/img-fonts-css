name: Build Keys

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - name: Create keys.js
        run: |
          echo "window.API_KEY_YOUTUBE = '${{ secrets.API_KEY_YOUTUBE }}';" >> dist/keys.js
          echo "window.PLAYLIST_ID_1 = '${{ secrets.PLAYLIST_ID_1 }}';" >> dist/keys.js
          echo "window.PLAYLIST_ID_2 = '${{ secrets.PLAYLIST_ID_2 }}';" >> dist/keys.js
          echo "window.PLAYLIST_ID_3 = '${{ secrets.PLAYLIST_ID_3 }}';" >> dist/keys.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
